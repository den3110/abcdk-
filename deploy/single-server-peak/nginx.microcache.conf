proxy_cache_path /var/cache/nginx/pickletour levels=1:2 keys_zone=pickletour_api_cache:32m max_size=512m inactive=30s use_temp_path=off;

map $request_method $pkt_cache_bypass_method {
    default 1;
    GET 0;
    HEAD 0;
}

map $http_authorization $pkt_cache_bypass_auth {
    default 1;
    "" 0;
}

map $cookie_connect_sid $pkt_cache_bypass_cookie {
    default 1;
    "" 0;
}

map "$pkt_cache_bypass_method$pkt_cache_bypass_auth$pkt_cache_bypass_cookie" $pkt_skip_cache {
    default 1;
    "000" 0;
}

location ~* ^/api/(tournaments/[^/]+$|tournaments/[^/]+/brackets$|tournaments/[^/]+/matches$|live/matches$|courts/[^/]+$|live-app/courts/[^/]+/runtime$) {
    proxy_cache pickletour_api_cache;
    proxy_cache_lock on;
    proxy_cache_revalidate on;
    proxy_cache_background_update on;
    proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_valid 200 302 3s;
    proxy_cache_valid 404 1s;
    proxy_ignore_headers Set-Cookie;
    proxy_hide_header Set-Cookie;
    proxy_no_cache $pkt_skip_cache;
    proxy_cache_bypass $pkt_skip_cache;
    add_header X-PKT-Nginx-Cache $upstream_cache_status always;

    proxy_pass http://127.0.0.1:5001;
}
