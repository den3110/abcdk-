# GraphQL audit snippet for the 7-day cutover window.
# Include this inside the production server block before removing /graphql.

location /graphql {
    access_log /var/log/nginx/pickletour-graphql-access.log;
    proxy_pass http://127.0.0.1:5000/graphql;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
