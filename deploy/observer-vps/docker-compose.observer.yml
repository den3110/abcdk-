services:
  observer-mongo:
    image: mongo:7
    container_name: pickletour-observer-mongo
    restart: unless-stopped
    volumes:
      - observer-mongo-data:/data/db
    ports:
      - "127.0.0.1:27017:27017"

  observer:
    image: ${OBSERVER_IMAGE:-060802/pickletour-observer:latest}
    container_name: pickletour-observer
    restart: unless-stopped
    depends_on:
      - observer-mongo
    env_file:
      - ./.env
    ports:
      - "8787:8787"

volumes:
  observer-mongo-data:
