services:
  cap:
    image: tiago2/cap:latest
    container_name: cap
    environment:
      ADMIN_KEY: ${CAP_ADMIN_KEY}
      REDIS_URL: redis://cap-valkey:6379
      ENABLE_ASSETS_SERVER: "true"
      WIDGET_VERSION: "0.1.46"
      WASM_VERSION: "0.0.6"
      CORS_ORIGIN: ${CAP_CORS_ORIGIN:-*}
    ports:
      - "3100:3000"
    depends_on:
      cap-valkey:
        condition: service_healthy
    restart: unless-stopped

  cap-valkey:
    image: valkey/valkey:9-alpine
    container_name: cap-valkey
    volumes:
      - cap-valkey-data:/data
    command: valkey-server --save 60 1 --loglevel warning --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: es01
    profiles: ["search"]
    environment:
      - discovery.type=single-node          # chạy 1 node cho dev
      - xpack.security.enabled=false        # tắt security cho dễ test local
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g          # ES dùng ~1GB RAM (chỉnh theo máy)
    ports:
      - "9200:9200"                         # Elasticsearch API
    volumes:
      - es-data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: kb01
    profiles: ["search"]
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"                         # Kibana UI
    depends_on:
      - elasticsearch

  # Redis server
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "127.0.0.1:6379:6379"          # Redis mặc định
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]

  # Redis Commander - giao diện web cho Redis
  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    container_name: redis-commander
    profiles: ["ops"]
    depends_on:
      - redis
    environment:
      # format: NAME:HOST:PORT:DB
      - REDIS_HOSTS=local:redis:6379:0
    ports:
      - "8081:8081"           # Web UI: http://localhost:8081

volumes:
  cap-valkey-data:
  es-data:
  redis-data:
